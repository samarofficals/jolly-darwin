name: Build Usery OS ISO

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      test_cloud:
        description: 'Test in Cloud VNC (Zero Download)?'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build ISO (Native Arch Linux Docker)
        run: |
          set -euo pipefail

          docker run --privileged --rm \
            -v "${{ github.workspace }}:/workspace" \
            archlinux:latest \
            bash -ec '
              set -euo pipefail
              echo "==> Updating pacman database..."
              pacman -Syu --noconfirm

              echo "==> Installing build tools..."
              pacman -S --noconfirm archiso mkinitcpio-archiso grub mtools dosfstools \
                libisoburn syslinux efibootmgr squashfs-tools erofs-utils

              echo "==> Preparing build directory from releng template..."
              mkdir -p /build
              cp -a /usr/share/archiso/configs/releng/. /build/


              pacman -Sy

              echo "==> Copying Usery OS customizations..."
              cp -a /workspace/usery-iso/. /build/

              echo "==> Creating live user: usery..."
              mkdir -p /build/airootfs/etc/sysusers.d
              echo "u usery 1000 \"Usery Live Account\" /home/usery /bin/bash" > /build/airootfs/etc/sysusers.d/10-usery.conf
              echo "g autologin - -" >> /build/airootfs/etc/sysusers.d/10-usery.conf
              echo "m usery autologin" >> /build/airootfs/etc/sysusers.d/10-usery.conf
              echo "m usery wheel" >> /build/airootfs/etc/sysusers.d/10-usery.conf
              echo "m usery video" >> /build/airootfs/etc/sysusers.d/10-usery.conf
              echo "m usery audio" >> /build/airootfs/etc/sysusers.d/10-usery.conf
              echo "m usery input" >> /build/airootfs/etc/sysusers.d/10-usery.conf

              mkdir -p /build/airootfs/etc/tmpfiles.d
              echo "d /home/usery 0700 usery usery - -" > /build/airootfs/etc/tmpfiles.d/10-usery.conf

              # Patch sudoers for usery
              mkdir -p /build/airootfs/etc/sudoers.d
              echo "usery ALL=(ALL) NOPASSWD: ALL" > /build/airootfs/etc/sudoers.d/10_usery
              chmod 440 /build/airootfs/etc/sudoers.d/10_usery

              echo "==> Enabling systemd services..."
              mkdir -p /build/airootfs/etc/systemd/system/graphical.target.wants
              mkdir -p /build/airootfs/etc/systemd/system/multi-user.target.wants
              ln -sf /usr/lib/systemd/system/sddm.service \
                /build/airootfs/etc/systemd/system/display-manager.service
              ln -sf /usr/lib/systemd/system/sddm.service \
                /build/airootfs/etc/systemd/system/graphical.target.wants/sddm.service
              ln -sf /usr/lib/systemd/system/NetworkManager.service \
                /build/airootfs/etc/systemd/system/multi-user.target.wants/NetworkManager.service
              ln -sf /usr/lib/systemd/system/graphical.target \
                /build/airootfs/etc/systemd/system/default.target

              echo "==> Patching PAM and Polkit for passwordless login..."
              if [ -f /build/airootfs/etc/pam.d/system-login ]; then
                sed -i "s/user = arch/user = usery/g" /build/airootfs/etc/pam.d/system-login
              fi

              echo "==> Injecting Wayland Virtualization fallback variables..."
              mkdir -p /build/airootfs/etc
              echo "WLR_NO_HARDWARE_CURSORS=1" >> /build/airootfs/etc/environment
              echo "WLR_RENDERER_ALLOW_SOFTWARE=1" >> /build/airootfs/etc/environment
              echo "LIBGL_ALWAYS_SOFTWARE=1" >> /build/airootfs/etc/environment
              echo "XDG_SESSION_TYPE=wayland" >> /build/airootfs/etc/environment

              echo "==> Branding bootloader..."
              find /build/syslinux /build/grub -type f 2>/dev/null | xargs -I{} sed -i \
                -e "s/Arch Linux install medium/Usery OS Live Environment/g" \
                -e "s/Arch Linux/Usery OS/g" {} || true

              echo "==> Running mkarchiso..."
              mkarchiso -v -w /tmp/archiso-tmp -o /workspace/out /build

              echo "==> Build complete! ISO files:"
              ls -lh /workspace/out/*.iso
            '

      - name: Verify ISO was created
        run: |
          if ! ls out/*.iso 1>/dev/null 2>&1; then
            echo "ERROR: No ISO file found in out/! The build failed silently."
            exit 1
          fi
          echo "ISO found:"
          ls -lh out/*.iso

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Usery-OS-ISO
          path: out/*.iso

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test in Cloud VNC
        if: github.event.inputs.test_cloud == 'true'
        run: |
          set -euo pipefail

          echo "==> Installing Cloud VNC tools..."
          sudo apt-get update -qq
          sudo apt-get install -y qemu-system-x86 novnc websockify

          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          ISO_FILE=$(ls out/*.iso | head -n 1)
          echo "==> Booting ISO: $ISO_FILE"

          qemu-system-x86_64 \
            -m 4096 \
            -smp 4 \
            -cdrom "$ISO_FILE" \
            -boot d \
            -vnc :0 \
            -enable-kvm \
            -device virtio-net,netdev=net0 \
            -netdev user,id=net0 \
            -vga virtio \
            -cpu host \
            -no-reboot &

          echo "==> Waiting 5s for QEMU to start..."
          sleep 5

          echo "==> Starting noVNC..."
          websockify --web=/usr/share/novnc/ 8080 localhost:5900 &

          echo "==> Starting Cloudflare tunnel..."
          cloudflared tunnel --url http://localhost:8080 > cloudflared.log 2>&1 &

          echo "==> Waiting 20s for tunnel URL..."
          sleep 20

          TUNNEL_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cloudflared.log | head -n 1 || echo "URL not found yet")

          echo "========================================================"
          echo "🚀 USERY OS CLOUD DESKTOP IS READY!"
          echo "🔗 Open this link in your browser:"
          echo "   ${TUNNEL_URL}/vnc.html"
          echo "   (Click Connect - no password needed)"
          echo "========================================================"

          echo "Keeping VM alive for 25 minutes..."
          sleep 1500
