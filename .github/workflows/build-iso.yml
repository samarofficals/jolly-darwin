name: Build Usery OS ISO

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      test_cloud:
        description: 'Test in Cloud VNC (Zero Download)?'
        type: boolean
        default: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build ISO using Docker
        run: |
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/workspace \
            archlinux:latest \
            /bin/bash -c "
              # Update and install build dependencies
              pacman -Syu --noconfirm archiso git grub mtools dosfstools libisoburn syslinux
              
              # Create build directory and use releng as a base for bootloader configs
              mkdir -p /build
              cp -a /usr/share/archiso/configs/releng/* /build/
              
              # Inject Chaotic-AUR repository to download Calamares GUI Installer without keyserver issues
              echo "" >> /build/pacman.conf
              echo "[chaotic-aur]" >> /build/pacman.conf
              echo "SigLevel = Never" >> /build/pacman.conf
              echo "Server = https://cdn-mirror.chaotic.cx/chaotic-aur/\$arch" >> /build/pacman.conf
              
              # Overwrite with our custom Usery OS configuration
              cp -a /workspace/usery-iso/* /build/
              
              # Enable GUI (SDDM) and graphical target for the live ISO
              mkdir -p /build/airootfs/etc/systemd/system/graphical.target.wants
              mkdir -p /build/airootfs/etc/systemd/system/multi-user.target.wants
              ln -sf /usr/lib/systemd/system/sddm.service /build/airootfs/etc/systemd/system/display-manager.service
              ln -sf /usr/lib/systemd/system/sddm.service /build/airootfs/etc/systemd/system/graphical.target.wants/sddm.service
              ln -sf /usr/lib/systemd/system/NetworkManager.service /build/airootfs/etc/systemd/system/multi-user.target.wants/NetworkManager.service
              ln -sf /usr/lib/systemd/system/graphical.target /build/airootfs/etc/systemd/system/default.target
              # Brand the Bootloader
              find /build/syslinux /build/grub -type f -exec sed -i 's/Arch Linux install medium/Usery OS Live Environment/g' {} + 2>/dev/null || true
              find /build/syslinux /build/grub -type f -exec sed -i 's/Arch Linux/Usery OS/g' {} + 2>/dev/null || true
              
              # Configure Live User (usery)
              if [ -f /build/airootfs/etc/passwd ]; then
                sed -i 's/^arch:/usery:/g' /build/airootfs/etc/passwd
                sed -i 's/\/home\/arch/\/home\/usery/g' /build/airootfs/etc/passwd
              fi
              if [ -f /build/airootfs/etc/shadow ]; then
                sed -i 's/^arch:/usery:/g' /build/airootfs/etc/shadow
              fi
              if [ -f /build/airootfs/etc/group ]; then
                sed -i 's/^arch:/usery:/g' /build/airootfs/etc/group
              fi
              if [ -f /build/airootfs/etc/gshadow ]; then
                sed -i 's/^arch:/usery:/g' /build/airootfs/etc/gshadow
              fi
              if [ -f /build/airootfs/etc/sysusers.d/arch.conf ]; then
                sed -i 's/ u arch / u usery /g' /build/airootfs/etc/sysusers.d/arch.conf
                sed -i 's/ m arch / m usery /g' /build/airootfs/etc/sysusers.d/arch.conf
                sed -i 's/\/home\/arch/\/home\/usery/g' /build/airootfs/etc/sysusers.d/arch.conf
                mv /build/airootfs/etc/sysusers.d/arch.conf /build/airootfs/etc/sysusers.d/usery.conf
              fi
              if [ -f /build/airootfs/etc/sudoers.d/10_archlinux ]; then
                sed -i 's/arch ALL/usery ALL/g' /build/airootfs/etc/sudoers.d/10_archlinux
                mv /build/airootfs/etc/sudoers.d/10_archlinux /build/airootfs/etc/sudoers.d/10_usery
              fi
              
              # Build the ISO
              cd /build
              mkarchiso -v -w /tmp/archiso-tmp -o /workspace/out .
            "

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Usery-OS-ISO
          path: out/*.iso

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test in Cloud VNC
        if: success() && github.event.inputs.test_cloud == 'true'
        run: |
          echo "Installing Cloud Testing Tools..."
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 novnc websockify
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          echo "Booting Usery OS ISO in QEMU..."
          qemu-system-x86_64 -m 4096 -smp 4 -cdrom out/*.iso -boot d -vnc :0 -enable-kvm -net nic -net user &
          
          echo "Starting noVNC server..."
          websockify --web=/usr/share/novnc/ 8080 localhost:5900 &
          
          echo "Establishing Cloudflare Tunnel..."
          cloudflared tunnel --url http://localhost:8080 > cloudflared.log 2>&1 &
          
          echo "Waiting for Tunnel URL..."
          sleep 10
          
          echo "========================================================"
          echo "🚀 CLOUD VNC DESKTOP IS READY!"
          echo "🔗 Click this link to view Usery OS in your browser:"
          grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cloudflared.log | head -n 1 | awk '{print $1"/vnc.html"}'
          echo "========================================================"
          
          echo "VM is running. Workflow will remain open for 30 minutes for testing."
          sleep 1800
